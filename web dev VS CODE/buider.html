<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-tertiary: #263347;
      --accent-blue: #3B82F6;
      --accent-cyan: #22D3EE;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --border: rgba(148, 163, 184, 0.12);
      --border-hover: rgba(59, 130, 246, 0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.08), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,211,238,0.05), transparent);
    }
    .page { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }

    /* COMPAT BAR */
    .compat-bar {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 20px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 20px; font-size: 13px;
    }
    .compat-label { font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .compat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .chip-ok   { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .chip-warn { background: rgba(245,158,11,0.12);  color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .chip-info { background: rgba(59,130,246,0.12);  color: var(--accent-cyan); border: 1px solid rgba(59,130,246,0.25); }
    .compat-spacer { flex: 1; }
    .compat-status { display: flex; align-items: center; gap: 6px; color: var(--success); font-weight: 600; font-size: 13px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* TABLE CARD */
    .builder-card {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 12px; overflow: visible; animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .builder-table { width: 100%; border-collapse: collapse; }
    .builder-table thead tr { background: rgba(15,23,42,.5); border-radius: 12px 12px 0 0; }
    .builder-table thead th {
      padding: 12px 16px; font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-secondary); text-align: left;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .builder-table thead th:first-child { border-radius: 12px 0 0 0; }
    .builder-table thead th:last-child  { border-radius: 0 12px 0 0; }
    .builder-table thead th.align-right  { text-align: right; }
    .builder-table thead th.align-center { text-align: center; }
    .builder-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    .builder-table tbody tr:last-child { border-bottom: none; }
    .builder-table tbody tr:hover { background: rgba(59,130,246,.04); }
    .builder-table td { padding: 14px 16px; vertical-align: middle; }

    .col-category  { width: 145px; }
    .col-selection { width: auto; }
    .col-wattage   { width: 90px;  text-align: center; }
    .col-bench     { width: 130px; text-align: center; }
    .col-avail     { width: 120px; text-align: center; }
    .col-price     { width: 105px; text-align: right; }
    .col-buy       { width: 100px; text-align: right; }

    /* CATEGORY CELL */
    .cat-cell { display: flex; flex-direction: column; gap: 2px; }
    .cat-link {
      font-size: 13px; font-weight: 700; color: var(--accent-cyan);
      cursor: pointer; background: none; border: none;
      font-family: inherit; padding: 0; text-align: left; transition: color .2s;
      text-decoration: none; display: inline-block;
    }
    .cat-link:hover { color: var(--accent-blue); }
    .cat-sub { font-size: 11px; color: var(--text-secondary); }

    /* slot 2 */
    .cat-slot2 { padding-left: 12px; border-left: 2px solid rgba(59,130,246,.3); }
    .cat-slot2 .cat-link { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
    .cat-slot2 .cat-link:hover { color: var(--accent-cyan); }
    tr.slot2-row td { background: rgba(59,130,246,.025); border-top: 1px dashed rgba(59,130,246,.15); }
    tr.slot2-row:hover td { background: rgba(59,130,246,.055) !important; }

    /* ── CHOOSE BUTTON + HOVER PREVIEW ── */
    .choose-wrap { position: relative; display: inline-block; }

    .btn-choose {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(59,130,246,.1); color: var(--accent-blue);
      border: 1px dashed rgba(59,130,246,.4);
      padding: 7px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
      text-decoration: none;
    }
    .btn-choose:hover {
      background: rgba(59,130,246,.18); border-color: var(--accent-blue);
      color: #60a5fa;
    }

    .btn-choose-slot2 {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(59,130,246,.06); color: var(--text-secondary);
      border: 1px dashed rgba(59,130,246,.25);
      padding: 6px 12px; border-radius: 7px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
      text-decoration: none;
    }
    .btn-choose-slot2:hover {
      background: rgba(59,130,246,.14); border-color: rgba(59,130,246,.5);
      color: var(--accent-blue);
    }

    /* HOVER PREVIEW CARD */
    .preview-card {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      z-index: 500;
      width: 300px;
      background: var(--bg-primary);
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(59,130,246,.1);
      overflow: hidden;
      animation: previewIn .15s ease;
    }
    @keyframes previewIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    .choose-wrap:hover .preview-card { display: block; }

    .preview-header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: space-between;
    }
    .preview-header span { color: var(--accent-cyan); font-size: 10px; }

    .preview-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      transition: background .12s; cursor: pointer; text-decoration: none;
    }
    .preview-item:last-of-type { border-bottom: none; }
    .preview-item:hover { background: rgba(59,130,246,.07); }

    .preview-emoji {
      width: 34px; height: 34px; border-radius: 7px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .preview-info { flex: 1; min-width: 0; }
    .preview-name  { font-size: 12px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-specs { font-size: 10.5px; color: var(--text-secondary); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-price { font-size: 12px; font-weight: 700; color: var(--text-primary); flex-shrink: 0; }

    .preview-footer {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      background: rgba(59,130,246,.06);
      font-size: 11.5px; font-weight: 600;
      color: var(--accent-blue); text-align: center;
      cursor: pointer; transition: background .15s;
      text-decoration: none; display: block;
    }
    .preview-footer:hover { background: rgba(59,130,246,.12); }

    /* SELECTED PART */
    .part-cell { display: flex; align-items: center; gap: 12px; }
    .part-thumb {
      width: 46px; height: 46px; border-radius: 8px;
      background: var(--bg-primary); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 20px;
    }
    .part-thumb.sm { width: 38px; height: 38px; font-size: 17px; }
    .part-info { flex: 1; min-width: 0; }
    .part-name  { font-size: 13.5px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .part-name.sm { font-size: 13px; }
    .part-specs { margin-top: 2px; font-size: 11.5px; color: var(--text-secondary); }
    .part-badges { margin-top: 4px; display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .badge-green  { background: rgba(16,185,129,.15);  color: var(--success); }
    .badge-blue   { background: rgba(59,130,246,.12);  color: #60a5fa; }
    .badge-amber  { background: rgba(245,158,11,.12);  color: var(--warning); }
    .badge-purple { background: rgba(167,139,250,.12); color: #a78bfa; }
    .part-actions { margin-top: 5px; display: flex; gap: 12px; }
    .action-btn {
      font-size: 11px; color: var(--text-secondary); font-weight: 500;
      background: none; border: none; padding: 0; cursor: pointer;
      font-family: inherit; display: inline-flex; align-items: center; gap: 3px;
      transition: color .2s; text-decoration: none;
    }
    .action-btn.change:hover { color: var(--accent-cyan); }
    .action-btn.remove:hover { color: var(--danger); }

    /* WATTAGE */
    .wattage-val { font-size: 13px; font-weight: 700; color: var(--text-primary); display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .wattage-bar-track { width: 52px; height: 3px; background: rgba(148,163,184,.15); border-radius: 4px; overflow: hidden; }
    .wattage-bar-fill  { height: 100%; border-radius: 4px; }
    .watt-low  { background: var(--success); }
    .watt-mid  { background: var(--warning); }
    .watt-high { background: var(--danger); }

    /* BENCHMARK */
    .bench-cell   { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .bench-score  { font-size: 13px; font-weight: 800; letter-spacing: -.3px; font-variant-numeric: tabular-nums; }
    .bench-source { font-size: 9.5px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }
    .bench-s { color: #a78bfa; }
    .bench-a { color: var(--success); }
    .bench-b { color: var(--accent-cyan); }
    .bench-c { color: var(--warning); }

    /* AVAILABILITY */
    .avail-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
    .avail-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .avail-in  { background: rgba(16,185,129,.15); color: var(--success); border: 1px solid rgba(16,185,129,.25); }
    .avail-in  .avail-dot { background: var(--success); box-shadow: 0 0 4px var(--success); }
    .avail-low { background: rgba(245,158,11,.12);  color: var(--warning); border: 1px solid rgba(245,158,11,.25); }
    .avail-low .avail-dot { background: var(--warning); }
    .avail-out { background: rgba(239,68,68,.1);   color: var(--danger);  border: 1px solid rgba(239,68,68,.2); }
    .avail-out .avail-dot { background: var(--danger); }

    /* PRICE */
    .price-val  { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -.3px; }
    .price-deal { font-size: 10.5px; color: var(--success); font-weight: 600; margin-top: 2px; }

    /* BUY */
    .btn-buy {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--success); color: white;
      padding: 6px 13px; border-radius: 7px;
      font-size: 12px; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .btn-buy:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,.25); }

    /* SECTION DIVIDER */
    .section-wrap { padding: 0 16px; border-top: 1px solid var(--border); }
    .section-divider { display: flex; align-items: center; gap: 12px; padding: 14px 0 2px; }
    .section-divider span { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); white-space: nowrap; }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .dash { color: var(--text-secondary); font-size: 13px; }

    /* TOAST */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: all .25s; pointer-events: none; z-index: 300; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 6px; }
  </style>
</head>
<body>
<div class="page">

  <div class="compat-bar">
    <span class="compat-label">Compatibility</span>
    <div class="compat-chips" id="compatChips"><span class="chip chip-info">No parts selected</span></div>
    <div class="compat-spacer"></div>
    <div class="compat-status">
      <div class="status-dot"></div>
      <span id="partsCount">0 Parts Selected</span>
    </div>
  </div>

  <div class="builder-card">
    <table class="builder-table">
      <thead>
        <tr>
          <th class="col-category">Component</th>
          <th class="col-selection">Selection</th>
          <th class="col-wattage align-center">Wattage</th>
          <th class="col-bench align-center">Benchmark</th>
          <th class="col-avail align-center">Availability</th>
          <th class="col-price align-right">Price</th>
          <th class="col-buy align-right">Buy</th>
        </tr>
      </thead>
      <tbody id="coreBody"></tbody>
    </table>

    <div class="section-wrap">
      <div class="section-divider"><span>Optional Peripherals</span></div>
    </div>

    <table class="builder-table">
      <tbody id="peripheralBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // TOP 3 PREVIEW DATA
  // Your teammate populates this object with real parts from the category page.
  // Each key matches the component id. Each array has up to 3 items.
  // Fields: name, specs, price, emoji
  // ─────────────────────────────────────────────────────────────────────────
  const TOP3 = {
    cpu:         [],
    motherboard: [],
    gpu:         [],
    memory:      [],
    memory2:     [],
    storage:     [],
    psu:         [],
    case:        [],
    cooler:      [],
    monitor:     [],
    keyboard:    [],
    mouse:       [],
    headset:     [],
  };

  // ─────────────────────────────────────────────────────────────────────────
  // COMPONENT DEFINITIONS
  // ─────────────────────────────────────────────────────────────────────────
  const CORE = [
    { id: 'cpu',         label: 'CPU',           sub: 'Processor',        emoji: '🔲', btn: 'Choose A CPU' },
    { id: 'motherboard', label: 'Motherboard',   sub: 'Main Board',       emoji: '🖥️', btn: 'Choose A Motherboard' },
    { id: 'gpu',         label: 'Video Card',    sub: 'GPU',              emoji: '🎮', btn: 'Choose A Video Card' },
    { id: 'memory',      label: 'Memory',        sub: 'Slot 1',           emoji: '💾', btn: 'Choose Memory' },
    { id: 'storage',     label: 'Storage',       sub: 'SSD / HDD',        emoji: '💿', btn: 'Choose Storage' },
    { id: 'psu',         label: 'Power Supply',  sub: 'PSU',              emoji: '🔌', btn: 'Choose A Power Supply' },
    { id: 'case',        label: 'Case',          sub: 'Enclosure',        emoji: '🗄️', btn: 'Choose A Case' },
    { id: 'cooler',      label: 'CPU Cooler',    sub: 'Thermal Solution', emoji: '❄️', btn: 'Choose A CPU Cooler' },
  ];

  const PERIPH = [
    { id: 'monitor',  label: 'Monitor',  sub: 'Display', emoji: '🖥',  btn: 'Choose A Monitor' },
    { id: 'keyboard', label: 'Keyboard', sub: 'Input',   emoji: '⌨️', btn: 'Choose A Keyboard' },
    { id: 'mouse',    label: 'Mouse',    sub: 'Input',   emoji: '🖱️', btn: 'Choose A Mouse' },
    { id: 'headset',  label: 'Headset',  sub: 'Audio',   emoji: '🎧', btn: 'Choose A Headset' },
  ];

  // ─────────────────────────────────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────────────────────────────────
  function getParts() { try { return JSON.parse(sessionStorage.getItem('builderParts') || '{}'); } catch { return {}; } }
  function saveParts(p) { sessionStorage.setItem('builderParts', JSON.stringify(p)); }

  // Check if category page sent a chosen part back
  (function applyPending() {
    const raw = sessionStorage.getItem('pendingPart');
    if (!raw) return;
    sessionStorage.removeItem('pendingPart');
    try {
      const { componentId, part } = JSON.parse(raw);
      const p = getParts();
      p[componentId] = part;
      saveParts(p);
    } catch {}
  })();

  // ─────────────────────────────────────────────────────────────────────────
  // TOAST
  // ─────────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // RENDER HELPERS
  // ─────────────────────────────────────────────────────────────────────────
  function wattageHTML(watts) {
    if (watts === null || watts === undefined) return '<span class="dash">—</span>';
    const pct = Math.min((watts / 500) * 100, 100);
    const cls = watts < 100 ? 'watt-low' : watts < 250 ? 'watt-mid' : 'watt-high';
    return `<div class="wattage-val"><span>${watts}W</span>
      <div class="wattage-bar-track"><div class="wattage-bar-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  }

  function benchHTML(bench) {
    if (!bench) return '<span class="dash">—</span>';
    return `<div class="bench-cell">
      <span class="bench-score bench-${bench.tier}">${bench.score.toLocaleString()}</span>
      <span class="bench-source">${bench.source}</span>
    </div>`;
  }

  function availHTML(avail) {
    if (!avail) return '<span class="dash">—</span>';
    const map = { in: ['avail-in','In Stock'], low: ['avail-low','Low Stock'], out: ['avail-out','Out of Stock'] };
    const [cls, label] = map[avail] || map.in;
    return `<span class="avail-pill ${cls}"><span class="avail-dot"></span>${label}</span>`;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // BUILD HOVER PREVIEW CARD HTML
  // ─────────────────────────────────────────────────────────────────────────
  function previewCardHTML(compId, label) {
    const items = TOP3[compId] || [];
    const catUrl = `category.html?category=${compId}&from=builder`;

    let itemsHTML = '';
    if (items.length === 0) {
      itemsHTML = `<div style="padding:14px 16px;font-size:12px;color:var(--text-secondary);text-align:center;">No items yet</div>`;
    } else {
      itemsHTML = items.slice(0, 3).map(item => `
        <a class="preview-item" href="${catUrl}">
          <div class="preview-emoji">${item.emoji || '📦'}</div>
          <div class="preview-info">
            <div class="preview-name">${item.name}</div>
            <div class="preview-specs">${item.specs || ''}</div>
          </div>
          <div class="preview-price">${item.price || ''}</div>
        </a>`).join('');
    }

    return `<div class="preview-card">
      <div class="preview-header">
        <span>Top picks · ${label}</span>
        <span>Hover to preview</span>
      </div>
      ${itemsHTML}
      <a class="preview-footer" href="${catUrl}">View all ${label} →</a>
    </div>`;
  }

  const plusSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
  const cartSVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>`;

  // ─────────────────────────────────────────────────────────────────────────
  // BUILD A TABLE ROW
  // ─────────────────────────────────────────────────────────────────────────
  function makeRow(comp, parts) {
    const sel     = parts[comp.id];
    const catUrl  = `category.html?category=${comp.id}&from=builder`;
    const tr      = document.createElement('tr');
    tr.id = 'row-' + comp.id;

    // category cell
    const tdCat = document.createElement('td'); tdCat.className = 'col-category';
    tdCat.innerHTML = `<div class="cat-cell">
      <a class="cat-link" href="${catUrl}">${comp.label}</a>
      <span class="cat-sub">${comp.sub}</span>
    </div>`;

    const tdSel   = document.createElement('td'); tdSel.className   = 'col-selection';
    const tdWatt  = document.createElement('td'); tdWatt.className  = 'col-wattage';
    const tdBench = document.createElement('td'); tdBench.className = 'col-bench';
    const tdAvail = document.createElement('td'); tdAvail.className = 'col-avail';
    const tdPrice = document.createElement('td'); tdPrice.className = 'col-price';
    const tdBuy   = document.createElement('td'); tdBuy.className   = 'col-buy';

    if (sel) {
      // ── SELECTED STATE ──
      const badges = (sel.badges||[]).map(b=>`<span class="badge badge-${b.color}">${b.text}</span>`).join('');
      tdSel.innerHTML = `<div class="part-cell">
        <div class="part-thumb">${sel.emoji || comp.emoji}</div>
        <div class="part-info">
          <div class="part-name">${sel.name}</div>
          <div class="part-specs">${sel.specs || ''}</div>
          ${badges ? `<div class="part-badges">${badges}</div>` : ''}
          <div class="part-actions">
            <a class="action-btn change" href="${catUrl}">✎ Change</a>
            <button class="action-btn remove" data-id="${comp.id}">✕ Remove</button>
          </div>
        </div>
      </div>`;

      tdWatt.innerHTML  = wattageHTML(sel.watts);
      tdBench.innerHTML = benchHTML(sel.bench);
      tdAvail.innerHTML = availHTML(sel.avail);
      tdPrice.innerHTML = `<div class="price-val">${sel.price || '—'}</div>${sel.deal ? `<div class="price-deal">${sel.deal}</div>` : ''}`;
      tdBuy.innerHTML   = sel.buyLink
        ? `<a href="${sel.buyLink}" class="btn-buy" target="_blank">${cartSVG} Buy</a>`
        : `<button class="btn-buy" data-toast="No retailer link yet">${cartSVG} Buy</button>`;
    } else {
      // ── EMPTY STATE — choose button with hover preview ──
      tdSel.innerHTML = `
        <div class="choose-wrap">
          <a class="btn-choose" href="${catUrl}">${plusSVG} ${comp.btn}</a>
          ${previewCardHTML(comp.id, comp.label)}
        </div>`;

      tdWatt.innerHTML  = '<span class="dash">—</span>';
      tdBench.innerHTML = '<span class="dash">—</span>';
      tdAvail.innerHTML = '<span class="dash">—</span>';
      tdPrice.innerHTML = '<span class="dash">—</span>';
      tdBuy.innerHTML   = '<span class="dash">—</span>';
    }

    [tdCat, tdSel, tdWatt, tdBench, tdAvail, tdPrice, tdBuy].forEach(td => tr.appendChild(td));
    return tr;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // MEMORY SLOT 2 ROW
  // ─────────────────────────────────────────────────────────────────────────
  function makeMemory2Row(parts) {
    const sel    = parts['memory2'];
    const catUrl = `category.html?category=memory2&from=builder`;
    const tr     = document.createElement('tr');
    tr.id = 'row-memory2';
    tr.className = 'slot2-row';

    const tdCat = document.createElement('td'); tdCat.className = 'col-category';
    tdCat.innerHTML = `<div class="cat-cell cat-slot2">
      <a class="cat-link" href="${catUrl}">Memory</a>
      <span class="cat-sub">Slot 2 · Dual Channel</span>
    </div>`;

    const tdSel   = document.createElement('td'); tdSel.className   = 'col-selection';
    const tdWatt  = document.createElement('td'); tdWatt.className  = 'col-wattage';
    const tdBench = document.createElement('td'); tdBench.className = 'col-bench';
    const tdAvail = document.createElement('td'); tdAvail.className = 'col-avail';
    const tdPrice = document.createElement('td'); tdPrice.className = 'col-price';
    const tdBuy   = document.createElement('td'); tdBuy.className   = 'col-buy';

    if (sel) {
      const badges = (sel.badges||[]).map(b=>`<span class="badge badge-${b.color}">${b.text}</span>`).join('');
      tdSel.innerHTML = `<div class="part-cell">
        <div class="part-thumb sm">${sel.emoji || '💾'}</div>
        <div class="part-info">
          <div class="part-name sm">${sel.name} <span class="badge badge-purple" style="margin-left:4px">Slot 2</span></div>
          <div class="part-specs">${sel.specs || ''}</div>
          ${badges ? `<div class="part-badges">${badges}</div>` : ''}
          <div class="part-actions">
            <a class="action-btn change" href="${catUrl}">✎ Change</a>
            <button class="action-btn remove" data-id="memory2">✕ Remove</button>
          </div>
        </div>
      </div>`;
      tdWatt.innerHTML  = wattageHTML(sel.watts);
      tdBench.innerHTML = benchHTML(sel.bench);
      tdAvail.innerHTML = availHTML(sel.avail);
      tdPrice.innerHTML = `<div class="price-val">${sel.price || '—'}</div>`;
      tdBuy.innerHTML   = `<button class="btn-buy" data-toast="No retailer link yet">${cartSVG} Buy</button>`;
    } else {
      tdSel.innerHTML = `
        <div class="choose-wrap">
          <a class="btn-choose-slot2" href="${catUrl}">${plusSVG} Add Second RAM Kit</a>
          ${previewCardHTML('memory2', 'Memory')}
        </div>`;
      tdWatt.innerHTML  = '<span class="dash">—</span>';
      tdBench.innerHTML = '<span class="dash">—</span>';
      tdAvail.innerHTML = '<span class="dash">—</span>';
      tdPrice.innerHTML = '<span class="dash">—</span>';
      tdBuy.innerHTML   = '<span class="dash">—</span>';
    }

    [tdCat, tdSel, tdWatt, tdBench, tdAvail, tdPrice, tdBuy].forEach(td => tr.appendChild(td));
    return tr;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────────────────────────────────────
  function render() {
    const parts = getParts();
    const cb = document.getElementById('coreBody');
    const pb = document.getElementById('peripheralBody');
    cb.innerHTML = ''; pb.innerHTML = '';

    CORE.forEach(comp => {
      cb.appendChild(makeRow(comp, parts));
      if (comp.id === 'memory' && parts['memory']) {
        cb.appendChild(makeMemory2Row(parts));
      }
    });
    PERIPH.forEach(c => pb.appendChild(makeRow(c, parts)));

    // update status bar
    const count = Object.keys(parts).length;
    document.getElementById('partsCount').textContent = `${count} Part${count !== 1 ? 's' : ''} Selected`;

    const chips = document.getElementById('compatChips');
    const hasDual = parts['memory'] && parts['memory2'];
    chips.innerHTML = count === 0
      ? '<span class="chip chip-info">No parts selected</span>'
      : `<span class="chip chip-ok">✓ ${count} Component${count !== 1 ? 's' : ''} Added</span>
         <span class="chip chip-info">ATX Form Factor</span>
         ${hasDual ? '<span class="chip chip-ok">✓ Dual Channel RAM</span>' : ''}
         ${count >= 2 ? '<span class="chip chip-warn">⚠ Check PSU Wattage</span>' : ''}`;

    // wire remove buttons
    document.querySelectorAll('.action-btn.remove').forEach(btn =>
      btn.addEventListener('click', () => {
        const p    = getParts();
        const name = p[btn.dataset.id]?.name || 'Part';
        delete p[btn.dataset.id];
        if (btn.dataset.id === 'memory') delete p['memory2'];
        saveParts(p); render();
        showToast(`✕ ${name} removed`);
      })
    );

    // wire toast buttons
    document.querySelectorAll('[data-toast]').forEach(btn =>
      btn.addEventListener('click', () => showToast(btn.dataset.toast))
    );
  }

  render();
</script>
</body>
