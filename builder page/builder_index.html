<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bulder_style.css">
</head>
<body>
<div class="page">

  <div class="compat-bar">
    <span class="compat-label">Compatibility</span>
    <div class="compat-chips" id="compatChips"><span class="chip chip-info">No parts selected</span></div>
    <div class="compat-spacer"></div>
    <div class="compat-status">
      <div class="status-dot"></div>
      <span id="partsCount">0 Parts Selected</span>
    </div>
  </div>

  <div class="builder-card">
    <table class="builder-table">
      <thead>
        <tr>
          <th class="col-category">Component</th>
          <th class="col-selection">Selection</th>
          <th class="col-wattage align-center">Wattage</th>
          <th class="col-bench align-center">Benchmark</th>
          <th class="col-avail align-center">Availability</th>
          <th class="col-price align-right">Price</th>
          <th class="col-buy align-right">Buy</th>
        </tr>
      </thead>
      <tbody id="coreBody"></tbody>
    </table>

    <div class="section-wrap">
      <div class="section-divider"><span>Optional Peripherals</span></div>
    </div>

    <table class="builder-table">
      <tbody id="peripheralBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="builder_script.js"></script>
</body>
</html>
