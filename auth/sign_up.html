<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>

<link rel="stylesheet" href="log.css">
</head>

<body>

<div class="auth-page">

    <div class="auth-box">

        <h2>Create Account</h2>

        <label>First Name</label>
        <input type="text">

        <label>Last Name</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Phone</label>
        <input type="tel">

        <label>Password</label>
        <input type="password">

        <button class="login-btn">Create Account</button>

        <p class="switch">
            Already have account?
            <a href="sign_in.html">Login</a>
        </p>

        <p class="switch">
            <a href="../Home-page/index.html">← Back Home</a>
        </p>

    </div>

</div>

<script src="log.js"></script>
</body>
</html>
